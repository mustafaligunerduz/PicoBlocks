<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pico Blocks - Sorunsuz 30 Bölüm Sürümü</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        body {
            margin: 0; padding: 0; background: #1a1a24; color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh;
            user-select: none; -webkit-user-select: none; overflow: hidden;
        }
        #lobby, #waiting-room, #game-container {
            background: #252538; padding: 30px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 2px solid #3d3d5c;
            box-sizing: border-box; width: 400px; text-align: center;
        }
        #waiting-room, #game-container { display: none; }
        #game-container { width: auto; }
        
        input, button {
            width: 100%; padding: 12px; margin: 8px 0;
            border-radius: 6px; border: none; font-size: 15px; box-sizing: border-box;
        }
        input { background: #14141f; color: #00ffcc; border: 1px solid #3d3d5c; }
        button { background: #ff4a5a; color: #fff; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #e03e4d; }
        
        .mode-btn { background: #28a745; margin-bottom: 15px; font-size: 16px; }
        .mode-btn:hover { background: #218838; }

        canvas { background: #14141f; border: 3px solid #3d3d5c; border-radius: 8px; display: block; margin-top: 15px; outline: none; }
        #hud { display: flex; justify-content: space-between; font-size: 16px; font-weight: bold; color: #00ffcc; margin-bottom: 5px; }
        #mechanic-alert { text-align: center; font-weight: bold; color: #ffcc00; font-size: 14px; margin-top: 5px; }
        #error-msg { color: #ff4a5a; font-weight: bold; margin-top: 10px; font-size: 14px; min-height: 20px; }
    </style>
</head>
<body>

    <div id="lobby">
        <h2 style="color: #00ffcc; margin-top: 0; letter-spacing: 1px;">PICO BLOCKS 🐾</h2>
        <button class="mode-btn" id="btn-local-mode">🖥️ Aynı Bilgisayardan Oyna (2 Kişi)</button>
        <hr style="border-color: #3d3d5c; margin: 15px 0;">
        <div id="online-setup-panel">
            <h4 style="margin: 5px 0; color: #ffcc00;">Dünya Çapında (Online) Mod</h4>
            <input type="text" id="username" placeholder="Oyuncu Adı" value="Kedi">
            <input type="text" id="room-id" placeholder="Oda Adı">
            <button id="btn-create">Lobi Kur (Host)</button>
            <button id="btn-join" style="background:#007bff;">Odaya Katıl (Client)</button>
        </div>
        <div id="error-msg"></div>
    </div>

    <div id="waiting-room">
        <h3 style="color: #00ffcc; margin-top: 0;">⏳ BEKLEME ODASI</h3>
        <div id="w-room-name" style="font-weight: bold; color: #ffcc00; margin-bottom: 15px;">ODA: -</div>
        <div id="player-list" style="max-height: 180px; overflow-y: auto; margin-bottom: 15px;"></div>
        <div id="start-status" style="font-size: 14px; font-weight: bold; color: #ff4a5a;">2 Oyuncu Bekleniyor...</div>
    </div>

    <div id="game-container">
        <div id="hud">
            <div>MOD: <span id="stat-mode" style="color:#fff;">-</span></div>
            <div>BÖLÜM: <span id="stat-level" style="color:#ffcc00;">1</span>/30</div>
            <div>OYUNCULAR: <span id="stat-players">0</span></div>
        </div>
        <div id="mechanic-alert">Yükleniyor...</div>
        <canvas id="gameCanvas" width="800" height="450" tabindex="1"></canvas>
        <p style="font-size: 11px; color: #aaa; text-align:center; margin-top: 8px;">P1: WASD (S: Yerçekimi) | P2: Yön Tuşları (▼: Yerçekimi) | Tuşlar işlemezse ekrana tıklayın!</p>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const errDiv = document.getElementById('error-msg');
        
        let peer = null, connections = [], isHost = false, myId = "", myName = "", isLocalMode = false;
        let players = {}, currentLevel = 1, hasKey = false, maxPlayers = 2;
        let mapLoaded = false, gameStarted = false; 

        let currentGravityDir = { p1: 1, p2: 1 }; 
        let movingPlatforms = [];
        let lasers = [];
        let bouncePads = [];
        let globalGravity = 0.5;

        const keys = {
            w: false, a: false, s: false, d: false, " ": false,
            ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false
        };
        
        window.addEventListener('keydown', e => { 
            if(e.key in keys) keys[e.key] = true;
            if(e.key.toLowerCase() === 'w') keys.w = true;
            if(e.key.toLowerCase() === 'a') keys.a = true;
            if(e.key.toLowerCase() === 's') keys.s = true;
            if(e.key.toLowerCase() === 'd') keys.d = true;

            if(currentLevel >= 11 && currentLevel <= 15) {
                if(isLocalMode) {
                    if(e.key.toLowerCase() === 's') currentGravityDir.p1 *= -1;
                    if(e.key === 'ArrowDown') currentGravityDir.p2 *= -1;
                } else {
                    if(e.key.toLowerCase() === 's' || e.key === 'ArrowDown') {
                        currentGravityDir.p1 *= -1;
                    }
                }
            }

            if(e.key === 'Enter' && isHost && !gameStarted && !isLocalMode) {
                if(Object.keys(players).length >= 2) { gameStarted = true; broadcastData({ type: 'START_GAME' }); startGameSystem(); }
            }
        });
        
        window.addEventListener('keyup', e => { 
            if(e.key in keys) keys[e.key] = false;
            if(e.key.toLowerCase() === 'w') keys.w = false;
            if(e.key.toLowerCase() === 'a') keys.a = false;
            if(e.key.toLowerCase() === 's') keys.s = false;
            if(e.key.toLowerCase() === 'd') keys.d = false;
        });

        let platforms = [];
        let keyObj = { x: 0, y: 0, size: 15, collected: false };
        let doorObj = { x: 0, y: 0, w: 40, h: 60 };

        document.getElementById('btn-local-mode').addEventListener('click', (e) => {
            e.preventDefault();
            isLocalMode = true; 
            gameStarted = true; 
            mapLoaded = true;
            
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            document.getElementById('stat-mode').innerText = "AYNI PC";

            players["p1"] = { id: "p1", x: 80, y: 350, vx: 0, vy: 0, name: "P1 (WASD)", color: "#ff4a5a", isGrounded: false };
            players["p2"] = { id: "p2", x: 140, y: 350, vx: 0, vy: 0, name: "P2 (Yön)", color: "#007bff", isGrounded: false };

            loadLevel(currentLevel);
            canvas.focus(); 
            localGameLoop();
        });

        function initOnline(hostFlag) {
            errDiv.innerText = "Bağlanılıyor...";
            myName = document.getElementById('username').value.trim() || "Kedi";
            let roomName = document.getElementById('room-id').value.trim().toLowerCase().replace(/[^a-z0-9]/g, '');
            if(!roomName) { errDiv.innerText = "Lütfen bir oda adı girin!"; return; }

            isHost = hostFlag;
            peer = new Peer("pico-b30-" + roomName, { host: '0.peerjs.com', port: 443, secure: true });

            peer.on('error', () => { errDiv.innerText = "Bağlantı Hatası veya Oda İsmi Dolu!"; });
            peer.on('open', (id) => {
                myId = id;
                document.getElementById('lobby').style.display = 'none';
                document.getElementById('waiting-room').style.display = 'block';
                document.getElementById('w-room-name').innerText = "ODA: " + roomName.toUpperCase();
                document.getElementById('stat-mode').innerText = "ONLINE";

                players[myId] = { id: myId, x: 80, y: 350, vx: 0, vy: 0, name: myName, color: "#ff4a5a", isGrounded: false };
                updateWaitingRoomUI();

                if(isHost) {
                    peer.on('connection', conn => {
                        if(Object.keys(players).length >= maxPlayers) { setTimeout(() => conn.close(), 500); return; }
                        connections.push(conn); setupConnectionEvents(conn);
                    });
                } else {
                    const conn = peer.connect("pico-b30-" + roomName, { reliable: false });
                    connections.push(conn); setupConnectionEvents(conn);
                }
            });
        }

        function setupConnectionEvents(conn) {
            conn.on('open', () => { if(!isHost) conn.send({ type: 'JOIN', name: myName }); });
            conn.on('data', data => {
                if(data.type === 'JOIN') {
                    players[conn.peer] = { id: conn.peer, x: 140, y: 350, vx: 0, vy: 0, name: data.name, color: '#007bff', isGrounded: false };
                    broadcastData({ type: 'ROOM_SYNC', playersData: players }); updateWaitingRoomUI();
                }
                if(data.type === 'ROOM_SYNC') { players = data.playersData; updateWaitingRoomUI(); }
                if(data.type === 'START_GAME') { gameStarted = true; startGameSystem(); }
                if(data.type === 'KEY_COLLECTED') { hasKey = true; keyObj.collected = true; }
                if(data.type === 'MOVE') {
                    if(players[conn.peer]) {
                        players[conn.peer].x = data.x; players[conn.peer].y = data.y;
                        players[conn.peer].vx = data.vx; players[conn.peer].vy = data.vy;
                    }
                }
                if(data.type === 'GRAVITY_SYNC') { currentGravityDir = data.gDir; }
                if(data.type === 'SYNC') {
                    currentLevel = data.level; hasKey = data.hasKey; platforms = data.platforms; movingPlatforms = data.movingPlatforms;
                    bouncePads = data.bouncePads; lasers = data.lasers; keyObj = data.keyObj; doorObj = data.doorObj; mapLoaded = true; currentGravityDir = data.gDir;
                    for(let id in data.playersData) { if(id !== myId) players[id] = data.playersData[id]; }
                }
            });
        }
        function broadcastData(obj) { connections.forEach(c => { if(c.open) c.send(obj); }); }
        function updateWaitingRoomUI() {
            let list = document.getElementById('player-list'); list.innerHTML = "";
            for(let id in players) { list.innerHTML += `<div class="player-list-item"><span>🐾 ${players[id].name}</span></div>`; }
            let status = document.getElementById('start-status');
            if(Object.keys(players).length < 2) status.innerText = "Oyuncu Bekleniyor (1/2)...";
            else { status.style.color = "#00ffcc"; status.innerHTML = isHost ? "BAŞLATMAK İÇİN ENTER'A BASIN" : "Hostun başlatması bekleniyor..."; }
        }

        function startGameSystem() {
            document.getElementById('waiting-room').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            mapLoaded = true; loadLevel(currentLevel);
            canvas.focus();
            if(isHost) { gameLoop(); }
            else {
                function clientLoop() {
                    let hostConn = connections[0];
                    if(mapLoaded && hostConn && hostConn.open) {
                        updatePhysics(players[myId], "wasd", myId);
                        if(!hasKey && Math.hypot(players[myId].x - keyObj.x, players[myId].y - keyObj.y) < 25) hostConn.send({ type: 'KEY_COLLECTED' });
                        hostConn.send({ type: 'MOVE', x: players[myId].x, y: players[myId].y, vx: players[myId].vx, vy: players[myId].vy });
                        hostConn.send({ type: 'GRAVITY_SYNC', gDir: currentGravityDir });
                    }
                    drawGame(); requestAnimationFrame(clientLoop);
                }
                clientLoop();
            }
        }

        // --- 30 BÖLÜM TASARIM MOTORU ---
        function loadLevel(lvl) {
            hasKey = false; keyObj.collected = false;
            let startX = 80;
            for(let id in players) { 
                players[id].x = startX; 
                players[id].y = (lvl >= 11 && lvl <= 15) ? 200 : 350; 
                players[id].vy = 0; startX += 60; 
            }
            
            platforms = []; movingPlatforms = []; bouncePads = []; lasers = [];
            currentGravityDir = { p1: 1, p2: 1 };

            platforms.push({ x: 0, y: 420, w: 800, h: 30 }); // Taban yer zemini
            doorObj.x = 730; doorObj.y = 360; // Genel varsayılan kapı konumu

            let alertDiv = document.getElementById('mechanic-alert');

            if(lvl >= 1 && lvl <= 5) {
                alertDiv.innerText = `BÖLÜM ${lvl}: Klasik Mod - Birbirinizin Üstüne Basarak Yükselin!`;
                if(lvl === 1) { platforms.push({x: 350, y: 320, w: 100, h: 20}); keyObj.x = 400; keyObj.y = 280; }
                if(lvl === 2) { platforms.push({x: 200, y: 300, w: 120, h: 20}, {x: 450, y: 220, w: 120, h: 20}); keyObj.x = 510; keyObj.y = 180; }
                if(lvl === 3) { platforms.push({x: 150, y: 330, w: 80, h: 20}, {x: 320, y: 250, w: 80, h: 20}, {x: 500, y: 180, w: 80, h: 20}); keyObj.x = 540; keyObj.y = 130; }
                
                // BÖLÜM 4: KAPAR VE ANAHTAR TABANDA / YERDE OLSUN AYARI
                if(lvl === 4) { 
                    platforms.push({x: 200, y: 230, w: 400, h: 20}); // Üstteki engel platformu
                    keyObj.x = 400; keyObj.y = 395; // Anahtar en altta yerde (tabanda)
                    doorObj.x = 730; doorObj.y = 360; // Kapı en altta yerde (tabanda)
                }
                
                if(lvl === 5) { platforms.push({x: 300, y: 160, w: 200, h: 20}); keyObj.x = 400; keyObj.y = 100; doorObj.y = 360; doorObj.x = 730; }
            }
            else if(lvl >= 6 && lvl <= 10) {
                alertDiv.innerText = `BÖLÜM ${lvl}: Trambolin Dünyası - Zıplama Tuşları Kapalı!`;
                if(lvl === 6) { bouncePads.push({x: 300, y: 405, w: 50, h: 15, force: -13}); keyObj.x = 325; keyObj.y = 180; }
                if(lvl === 7) { bouncePads.push({x: 200, y: 405, w: 50, h: 15, force: -11}, {x: 450, y: 405, w: 50, h: 15, force: -14}); keyObj.x = 475; keyObj.y = 150; }
                if(lvl === 8) { platforms.push({x: 300, y: 250, w: 200, h: 20}); bouncePads.push({x: 150, y: 405, w: 50, h: 15, force: -14}); keyObj.x = 400; keyObj.y = 200; }
                if(lvl === 9) { bouncePads.push({x: 100, y: 405, w: 40, h: 15, force: -12}, {x: 350, y: 405, w: 40, h: 15, force: -15}); keyObj.x = 370; keyObj.y = 120; doorObj.x = 700; }
                if(lvl === 10) { platforms.push({x: 500, y: 200, w: 100, h: 20}); bouncePads.push({x: 250, y: 405, w: 60, h: 15, force: -16}); keyObj.x = 550; keyObj.y = 140; }
            }
            else if(lvl >= 11 && lvl <= 15) {
                alertDiv.innerText = `BÖLÜM ${lvl}: Yerçekimi Odası - [S] veya [Aşağı Yön] ile Tavana Geç!`;
                platforms.push({ x: 0, y: 0, w: 800, h: 30 }); 
                if(lvl === 11) { keyObj.x = 400; keyObj.y = 80; }
                if(lvl === 12) { platforms.push({x: 300, y: 200, w: 200, h: 20}); keyObj.x = 400; keyObj.y = 250; }
                if(lvl === 13) { keyObj.x = 200; keyObj.y = 70; doorObj.y = 60; doorObj.x = 700; }
                if(lvl === 14) { platforms.push({x: 150, y: 150, w: 150, h: 20}, {x: 450, y: 280, w: 150, h: 20}); keyObj.x = 220; keyObj.y = 350; }
                if(lvl === 15) { keyObj.x = 600; keyObj.y = 80; doorObj.y = 360; }
            }
            else if(lvl >= 16 && lvl <= 20) {
                alertDiv.innerText = `BÖLÜM ${lvl}: Hareketli Bloklar - Platformun Üstünde Kal!`;
                if(lvl === 16) { movingPlatforms.push({x: 300, y: 300, w: 150, h: 20, startX: 200, endX: 500, speed: 2, dir: 1, type: "H"}); keyObj.x = 400; keyObj.y = 220; }
                if(lvl === 17) { movingPlatforms.push({x: 400, y: 320, w: 120, h: 20, startY: 200, endY: 380, speed: 2, dir: 1, type: "V"}); keyObj.x = 460; keyObj.y = 150; }
                if(lvl === 18) { movingPlatforms.push({x: 200, y: 250, w: 120, h: 20, startX: 150, endX: 400, speed: 3, dir: 1, type: "H"}, {x: 500, y: 300, w: 100, h: 20, startY: 180, endY: 360, speed: 2, dir: -1, type: "V"}); keyObj.x = 250; keyObj.y = 150; }
                if(lvl === 19) { movingPlatforms.push({x: 300, y: 200, w: 200, h: 20, startX: 100, endX: 600, speed: 4, dir: 1, type: "H"}); keyObj.x = 400; keyObj.y = 100; doorObj.x = 730; }
                if(lvl === 20) { movingPlatforms.push({x: 200, y: 350, w: 100, h: 20, startY: 150, endY: 380, speed: 3, dir: 1, type: "V"}, {x: 450, y: 200, w: 100, h: 20, startY: 150, endY: 380, speed: 3, dir: -1, type: "V"}); keyObj.x = 500; keyObj.y = 100; }
            }
            else if(lvl >= 21 && lvl <= 25) {
                alertDiv.innerText = `BÖLÜM ${lvl}: Lazer Koridoru - Kırmızı Lazerlerden Kaç!`;
                if(lvl === 21) { lasers.push({x: 350, y: 250, w: 15, h: 170, state: true, timer: 0, interval: 999}); keyObj.x = 450; keyObj.y = 350; }
                if(lvl === 22) { lasers.push({x: 200, y: 320, w: 400, h: 10, state: true, timer: 0, interval: 60}); platforms.push({x: 400, y: 250, w: 100, h: 20}); keyObj.x = 450; keyObj.y = 200; }
                if(lvl === 23) { lasers.push({x: 250, y: 200, w: 15, h: 220, state: true, timer: 0, interval: 80}, {x: 500, y: 200, w: 15, h: 220, state: true, timer: 40, interval: 80}); keyObj.x = 380; keyObj.y = 360; }
                if(lvl === 24) { lasers.push({x: 0, y: 220, w: 700, h: 10, state: true, timer: 0, interval: 100}); keyObj.x = 350; keyObj.y = 150; doorObj.x = 720; }
                if(lvl === 25) { lasers.push({x: 300, y: 250, w: 200, h: 15, state: true, timer: 0, interval: 50}); keyObj.x = 400; keyObj.y = 200; }
            }
            else if(lvl >= 26 && lvl <= 30) {
                alertDiv.innerText = `BÖLÜM ${lvl}: Buz Devri - Zemin Çok Kaygan, Momentumunu Ayarla!`;
                if(lvl === 26) { platforms.push({x: 300, y: 300, w: 200, h: 20}); keyObj.x = 400; keyObj.y = 250; }
                if(lvl === 27) { platforms.push({x: 150, y: 320, w: 150, h: 20}, {x: 450, y: 240, w: 150, h: 20}); keyObj.x = 520; keyObj.y = 190; }
                if(lvl === 28) { platforms.push({x: 350, y: 200, w: 100, h: 20}); keyObj.x = 400; keyObj.y = 150; }
                if(lvl === 29) { platforms.push({x: 200, y: 270, w: 400, h: 20}); keyObj.x = 400; keyObj.y = 220; doorObj.x = 500; }
                if(lvl === 30) { platforms.push({x: 100, y: 200, w: 600, h: 20}); keyObj.x = 400; keyObj.y = 140; doorObj.x = 650; doorObj.y = 140; }
            }

            document.getElementById('stat-level').innerText = currentLevel;
        }

        // --- FİZİK MOTORU ---
        function updatePhysics(p, controlType, pid) {
            if(!p) return;
            
            let isIce = (currentLevel >= 26 && currentLevel <= 30);
            let noJump = (currentLevel >= 6 && currentLevel <= 10);
            let gravityDir = (currentLevel >= 11 && currentLevel <= 15) ? (pid === "p1" || pid === myId ? currentGravityDir.p1 : currentGravityDir.p2) : 1;

            let moveSpeed = 3.5;
            let accel = isIce ? 0.15 : 1;
            let friction = isIce ? 0.96 : 0.7;

            let targetVx = 0;
            if (controlType === "wasd") {
                if (keys.a) targetVx = -moveSpeed;
                if (keys.d) targetVx = moveSpeed;
            } else if (controlType === "arrows") {
                if (keys.ArrowLeft) targetVx = -moveSpeed;
                if (keys.ArrowRight) targetVx = moveSpeed;
            }

            if(isIce) {
                p.vx += (targetVx - p.vx) * accel;
                p.vx *= friction;
            } else {
                p.vx = targetVx;
            }

            p.vy += globalGravity * gravityDir;
            p.x += p.vx;
            p.y += p.vy;
            p.isGrounded = false;

            platforms.forEach(plat => {
                if (p.x + 15 > plat.x && p.x - 15 < plat.x + plat.w && p.y + 15 > plat.y && p.y - 15 < plat.y + plat.h) {
                    if (gravityDir === 1 && p.vy > 0 && p.y - p.vy + 15 <= plat.y) { p.y = plat.y - 15; p.vy = 0; p.isGrounded = true; }
                    if (gravityDir === -1 && p.vy < 0 && p.y - p.vy - 15 >= plat.y + plat.h) { p.y = plat.y + plat.h + 15; p.vy = 0; p.isGrounded = true; }
                }
            });

            movingPlatforms.forEach(plat => {
                if (p.x + 15 > plat.x && p.x - 15 < plat.x + plat.w && p.y + 15 > plat.y && p.y - 15 < plat.y + plat.h) {
                    if (p.vy > 0 && p.y - p.vy + 15 <= plat.y) {
                        p.y = plat.y - 15; p.vy = 0; p.isGrounded = true;
                        if(plat.type === "H") p.x += plat.speed * plat.dir;
                    }
                }
            });

            bouncePads.forEach(pad => {
                if (p.x + 15 > pad.x && p.x - 15 < pad.x + pad.w && p.y + 15 > pad.y && p.y - 15 < pad.y + pad.h) { p.vy = pad.force; }
            });

            lasers.forEach(laser => {
                if (laser.state && p.x + 15 > laser.x && p.x - 15 < laser.x + laser.w && p.y + 15 > laser.y && p.y - 15 < laser.y + laser.h) {
                    p.x = 80; p.y = 350; p.vy = 0;
                }
            });

            for(let id in players) {
                if(id === pid) continue;
                let other = players[id];
                let distX = p.x - other.x; let distY = p.y - other.y;
                if (Math.abs(distX) < 22 && Math.abs(distY) < 30) {
                    if (gravityDir === 1 && p.vy > 0 && (p.y - p.vy + 15) <= (other.y - 12)) { p.y = other.y - 30; p.vy = 0; p.isGrounded = true; } 
                    else { if (distX > 0) p.x = other.x + 22; else p.x = other.x - 22; }
                }
            }

            if (!noJump) {
                let jumpKey = (controlType === "wasd") ? (keys.w || keys[" "]) : keys.ArrowUp;
                if (jumpKey && p.isGrounded) { p.vy = -10 * gravityDir; p.isGrounded = false; }
            }

            if (p.x < 15) p.x = 15; if (p.x > canvas.width - 15) p.x = canvas.width - 15;
            if (p.y > canvas.height || p.y < 0) { p.x = 80; p.y = 350; p.vy = 0; }
        }

        // --- OYUN DÖNGÜLERI ---
        function localGameLoop() {
            movingPlatforms.forEach(plat => {
                if(plat.type === "H") { plat.x += plat.speed * plat.dir; if(plat.x > plat.endX || plat.x < plat.startX) plat.dir *= -1; }
                else { plat.y += plat.speed * plat.dir; if(plat.y > plat.endY || plat.y < plat.startY) plat.dir *= -1; }
            });

            lasers.forEach(laser => { laser.timer++; if(laser.timer >= laser.interval) { laser.state = !laser.state; laser.timer = 0; } });

            updatePhysics(players["p1"], "wasd", "p1");
            updatePhysics(players["p2"], "arrows", "p2");

            if(!hasKey) {
                if(Math.hypot(players["p1"].x - keyObj.x, players["p1"].y - keyObj.y) < 25 || 
                   Math.hypot(players["p2"].x - keyObj.x, players["p2"].y - keyObj.y) < 25) {
                    hasKey = true; keyObj.collected = true;
                }
            }

            if(hasKey) {
                let p1AtDoor = (players["p1"].x >= doorObj.x - 10 && players["p1"].x <= doorObj.x + doorObj.w + 10 && players["p1"].y >= doorObj.y - 10 && players["p1"].y <= doorObj.y + doorObj.h + 10);
                let p2AtDoor = (players["p2"].x >= doorObj.x - 10 && players["p2"].x <= doorObj.x + doorObj.w + 10 && players["p2"].y >= doorObj.y - 10 && players["p2"].y <= doorObj.y + doorObj.h + 10);
                if(p1AtDoor && p2AtDoor) { currentLevel++; if(currentLevel > 30) currentLevel = 1; loadLevel(currentLevel); }
            }

            document.getElementById('stat-players').innerText = "2 (Yerel)";
            drawGame(); requestAnimationFrame(localGameLoop);
        }

        function gameLoop() {
            movingPlatforms.forEach(plat => {
                if(plat.type === "H") { plat.x += plat.speed * plat.dir; if(plat.x > plat.endX || plat.x < plat.startX) plat.dir *= -1; }
                else { plat.y += plat.speed * plat.dir; if(plat.y > plat.endY || plat.y < plat.startY) plat.dir *= -1; }
            });
            lasers.forEach(laser => { laser.timer++; if(laser.timer >= laser.interval) { laser.state = !laser.state; laser.timer = 0; } });

            updatePhysics(players[myId], "wasd", myId);

            if(!hasKey) {
                for(let id in players) { if(Math.hypot(players[id].x - keyObj.x, players[id].y - keyObj.y) < 25) { hasKey = true; keyObj.collected = true; } }
            }

            if(hasKey) {
                let everyoneAtDoor = true;
                for(let id in players) {
                    let p = players[id];
                    let atDoor = (p.x >= doorObj.x - 10 && p.x <= doorObj.x + doorObj.w + 10 && p.y >= doorObj.y - 10 && p.y <= doorObj.y + doorObj.h + 10);
                    if(!atDoor) everyoneAtDoor = false;
                }
                if(everyoneAtDoor) { currentLevel++; if(currentLevel > 30) currentLevel = 1; loadLevel(currentLevel); }
            }

            connections.forEach(c => { if(c.open) c.send({ type: 'SYNC', level: currentLevel, hasKey, platforms, movingPlatforms, bouncePads, lasers, keyObj, doorObj, playersData: players, gDir: currentGravityDir }); });
            document.getElementById('stat-players').innerText = Object.keys(players).length;
            drawGame(); requestAnimationFrame(gameLoop);
        }

        function drawGame() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if(!mapLoaded) return;

            platforms.forEach(plat => { ctx.fillStyle = "#4e4e6a"; ctx.fillRect(plat.x, plat.y, plat.w, plat.h); });
            movingPlatforms.forEach(plat => { ctx.fillStyle = "#ff9900"; ctx.fillRect(plat.x, plat.y, plat.w, plat.h); });
            bouncePads.forEach(pad => { ctx.fillStyle = "#33ff66"; ctx.fillRect(pad.x, pad.y, pad.w, pad.h); });
            lasers.forEach(laser => { if(laser.state) { ctx.fillStyle = "rgba(255, 74, 90, 0.8)"; ctx.fillRect(laser.x, laser.y, laser.w, laser.h); } });

            if (!hasKey) { ctx.fillStyle = "#ffcc00"; ctx.beginPath(); ctx.arc(keyObj.x, keyObj.y, keyObj.size, 0, Math.PI * 2); ctx.fill(); }
            ctx.fillStyle = hasKey ? "#00ffcc" : "#ff4a5a"; ctx.fillRect(doorObj.x, doorObj.y, doorObj.w, doorObj.h);

            for(let id in players) {
                let p = players[id]; ctx.fillStyle = p.color; ctx.fillRect(p.x - 15, p.y - 15, 30, 30);
                ctx.fillStyle = "#fff"; let eyeOffset = p.vx >= 0 ? 3 : -9; ctx.fillRect(p.x + eyeOffset, p.y - 8, 6, 6);
                
                ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.moveTo(p.x - 15, p.y - 15); ctx.lineTo(p.x - 7, p.y - 23); ctx.lineTo(p.x, p.y - 15); ctx.fill();
                ctx.beginPath(); ctx.moveTo(p.x + 15, p.y - 15); ctx.lineTo(p.x + 7, p.y - 23); ctx.lineTo(p.x, p.y - 15); ctx.fill();
                
                ctx.fillStyle = "#ffffff"; ctx.font = "10px sans-serif"; ctx.textAlign = "center"; ctx.fillText(p.name, p.x, p.y - 26);
            }
        }
    </script>
